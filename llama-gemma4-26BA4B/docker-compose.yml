services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-gemma4-26BA4B
    user: "${HOST_UID}:${HOST_GID}"
    ports:
      - "8087:8080"
    volumes:
      - ./models:/models:ro
    environment:
      - LLAMA_ARG_MODEL=/models/gemma-4-26B-A4B-it-Q4_K_M.gguf
      - LLAMA_ARG_MMPROJ=/models/mmproj-F16.gguf
      - LLAMA_ARG_MMPROJ_OFFLOAD=off
      - LLAMA_ARG_FIT=on
      - LLAMA_ARG_CTX_SIZE=262144
      - LLAMA_ARG_THREADS=10
      - LLAMA_ARG_FLASH_ATTN=on
      - LLAMA_ARG_MMAP=0
      - LLAMA_ARG_CACHE_TYPE_K=q8_0
      - LLAMA_ARG_CACHE_TYPE_V=q8_0
      - 'LLAMA_ARG_CHAT_TEMPLATE_KWARGS={"enable_thinking": true}'
    command: ["--temp", "1.2", "--top-p", "0.95", "--top-k", "64"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s