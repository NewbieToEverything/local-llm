services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-qwen36-35BA3B
    user: "${HOST_UID}:${HOST_GID}"
    ports:
      - "8085:8080"
    volumes:
      - ./models:/models:ro
    environment:
      - LLAMA_ARG_MODEL=/models/Qwen3.6-35B-A3B-Q4_K_M.gguf
      - LLAMA_ARG_FIT=on
      - LLAMA_ARG_CTX_SIZE=262144
      - LLAMA_ARG_N_PARALLEL=1
      - LLAMA_ARG_FLASH_ATTN=on
      - LLAMA_ARG_MMAP=0
      - LLAMA_ARG_CACHE_TYPE_K=q8_0
      - LLAMA_ARG_CACHE_TYPE_V=q8_0
      - LLAMA_ARG_MMPROJ=/models/mmproj-BF16.gguf
      - LLAMA_ARG_MMPROJ_OFFLOAD=off
      - LLAMA_ARG_THREADS=16
      - LLAMA_ARG_UBATCH=1024
      - LLAMA_ARG_TOP_K=20
      - GGML_CUDA_GRAPH_OPT=1
      - LLAMA_SET_ROWS=1
      - 'LLAMA_ARG_CHAT_TEMPLATE_KWARGS={"enable_thinking": true}'
    command: ["--temp", "1.0", "--top-p", "0.95", "--repeat-penalty", "1.0", "--presence-penalty", "1.5"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  codex-responses-proxy:
    image: python:3.13-slim
    container_name: codex-qwen36-responses-proxy
    network_mode: host
    volumes:
      - ../codex-llama-proxy/proxy.py:/app/proxy.py:ro
    command:
      - python3
      - /app/proxy.py
      - --listen
      - 127.0.0.1:18085
      - --upstream
      - http://127.0.0.1:8085
    depends_on:
      llama-server:
        condition: service_healthy
    restart: unless-stopped
