services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-gpt-oss-120b
    user: "${HOST_UID}:${HOST_GID}"
    ports:
      - "8082:8080"
    volumes:
      - ./models:/models:ro
    environment:
      - LLAMA_ARG_MODEL=/models/gpt-oss-120b-mxfp4-00001-of-00003.gguf
      - LLAMA_ARG_N_GPU_LAYERS=37
      - LLAMA_ARG_N_CPU_MOE=32
      - LLAMA_ARG_CTX_SIZE=131072
      - LLAMA_ARG_THREADS=10
      - LLAMA_ARG_BATCH=2048
      - LLAMA_ARG_UBATCH=512
      - LLAMA_ARG_N_PARALLEL=1
      - LLAMA_ARG_FLASH_ATTN=on
      - LLAMA_ARG_MMAP=0
      - LLAMA_ARG_CACHE_TYPE_K=q8_0
      - LLAMA_ARG_CACHE_TYPE_V=q8_0
      - 'LLAMA_ARG_CHAT_TEMPLATE_KWARGS={"reasoning_effort": "high"}'
    command: ["--temp", "1.0", "--top-p", "1.0", "--top-k", "0", "--repeat-penalty", "1.0", "--threads-batch", "12"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s